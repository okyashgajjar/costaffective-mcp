version: "2"

formatters:
  enable:
    - gofmt

linters:
  enable:
    - govet
    - staticcheck
    - errcheck
    - ineffassign
    - unused
  exclusions:
    rules:
      # Exclude Close and Rollback errcheck issues globally
      - linters:
          - errcheck
        text: "Close|Rollback"
      # Exclude os.Setenv and os.Chdir in tests
      - path: _test\.go
        linters:
          - errcheck
        text: "Setenv|Chdir"

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
